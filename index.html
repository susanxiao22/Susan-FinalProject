<<div id="lightbox">
  <div id="lightbox-content" onclick="event.stopPropagation()">

    <!-- Close button -->
    <span id="close-btn" onclick="closeModal()">×</span>

    <!-- Left arrow -->
    <span class="arrow left" onclick="changeImage(-1)">❮</span>

    <!-- Image -->
    <img id="lightbox-img">

    <!-- Right arrow -->
    <span class="arrow right" onclick="changeImage(1)">❯</span>

    <!-- Caption -->
    <div id="lightbox-caption">
      <h3 id="caption-title"></h3>
      <p id="caption-year"></p>
      <p id="caption-medium"></p>
    </div>

  </div>
</div>
